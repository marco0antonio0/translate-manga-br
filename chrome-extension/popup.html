<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Manga Translator Local</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main>
      <header class="app-header">
        <div class="brand-mark">
          <img src="logo.png" alt="" aria-hidden="true">
        </div>
        <div>
          <strong>Manga Translator Local</strong>
          <span>Leitor do navegador</span>
        </div>
      </header>

      <section id="loadingScreen" class="screen">
        <p class="hint">Verificando sessão...</p>
      </section>

      <section id="loginScreen" class="screen" hidden>
        <div class="system-line">
          <span>Sistema</span>
          <strong id="loginSystemUrl">—</strong>
        </div>

        <form id="loginForm" class="login-form">
          <div id="loginPanel" class="panel">
            <label>
              Email
              <input id="loginEmail" type="email" placeholder="voce@exemplo.com" autocomplete="username">
            </label>
            <label>
              Senha
              <input id="loginPassword" type="password" placeholder="••••••••" autocomplete="current-password">
            </label>
          </div>

          <button id="loginSubmit" type="submit" class="primary">Entrar</button>
        </form>
        <div id="loginError" class="error-alert" role="alert" hidden>
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="12" r="10"></circle>
            <path d="M12 8v5"></path>
            <path d="M12 16h.01"></path>
          </svg>
          <span></span>
        </div>
      </section>

      <section id="mainScreen" class="screen" hidden>
        <div class="user-card">
          <div class="user-row">
            <div class="avatar" aria-hidden="true">M</div>
            <div class="user-info">
              <span>Conectado</span>
              <strong id="userName">—</strong>
              <small id="userEmail">—</small>
            </div>
          </div>
          <button id="logoutButton" type="button" class="danger">Sair da conta</button>
        </div>

        <div class="system-line">
          <span>Sistema</span>
          <strong id="systemUrl">—</strong>
        </div>

        <div class="panel">
          <div class="grid">
            <label>
              Origem
              <select id="sourceLang"></select>
            </label>
            <label>
              Destino
              <select id="targetLang"></select>
            </label>
          </div>

          <label>
            Provider
            <select id="providerLang">
              <option value="google">Google Translate</option>
            </select>
          </label>
        </div>

        <div class="actions">
          <button id="openReader" type="button" class="primary">Abrir leitor nesta aba</button>
        </div>
      </section>

      <p id="status" role="status"></p>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
