# Compose de desenvolvimento local: constroi a imagem a partir do checkout e
# usa ./storage como bind mount para facilitar inspecao/backup durante dev.
services:
  nextjs:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: manga-nextjs
    ports:
      - "3080:3080"
    environment:
      NODE_ENV: "production"
      ALLOW_REMOTE_SETUP: "1"
      SECTION_IMAGE_PROCESSING_CONCURRENCY: "2"
    volumes:
      - ./storage:/app/storage
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3080/api/setup/status').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
