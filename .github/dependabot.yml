version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      frontend-runtime:
        patterns:
          - "next"
          - "react"
          - "react-dom"
          - "pdfjs-dist"
          - "socket.io-client"
      ui-and-tooling:
        patterns:
          - "@radix-ui/*"
          - "@types/*"
          - "tailwindcss"
          - "postcss"
          - "typescript"

  - package-ecosystem: "pip"
    directory: "/python-api"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      python-ml-stack:
        patterns:
          - "torch"
          - "torchvision"
          - "ultralytics"
          - "onnxruntime"
          - "opencv-python"
          - "numpy"
          - "pillow"
      python-api-stack:
        patterns:
          - "fastapi"
          - "uvicorn"
          - "python-multipart"
          - "requests"
          - "deep-translator"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
